events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 10 MB shared memory zone keyed by client IP (~160 000 states).
    # Gateway-level backstop: 10 requests/min across all /api/ traffic.
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

    # Cap the request body. The app uses presigned uploads for large blobs,
    # so JSON/form bodies should never approach this.
    client_max_body_size 1m;

    # Hide nginx version from error pages and Server header.
    server_tokens off;

    # gzip text assets — the SPA bundle compresses ~3-4x.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_vary on;

    upstream backend {
        server backend:8080;
    }

    # Security headers applied to every response. CSP is tighter than the dev
    # version (no need for vite HMR connections). When avatar uploads land
    # (deferred from s05) add the avatar host to img-src — e.g.
    # https://<bucket>.s3.<region>.amazonaws.com.
    map $sent_http_content_type $hp_csp {
        default "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; script-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none';";
    }

    # Plain HTTP -> permanent redirect to HTTPS.
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS server. Cloudflare Origin Certificate (15-year, see simple deploy
    # plan step s14) terminates TLS between Cloudflare and this box. End users
    # see Cloudflare's Universal SSL cert in the browser.
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/origin.pem;
        ssl_certificate_key /etc/nginx/certs/origin.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy $hp_csp always;

        # Static SPA — the React build is scp'd into /usr/share/nginx/spa
        # (volume-mounted from ./nginx/spa on the host). try_files falls back
        # to /index.html so client-side routing works on deep links.
        root /usr/share/nginx/spa;
        index index.html;

        # Long-cache hashed assets (vite emits content-hashed filenames).
        location ~* \.(js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico|map)$ {
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # index.html itself should never be cached aggressively, or users get
        # stuck on stale bundles after a deploy.
        location = /index.html {
            try_files $uri =404;
            add_header Cache-Control "no-cache";
        }

        # API: rate-limited, proxied to the backend container.
        location /api/ {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # GraphQL endpoint.
        location /graphql {
            proxy_pass http://backend/graphql;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Liveness probe (used by the EC2 health check and external monitoring).
        location = /healthz {
            proxy_pass http://backend/healthz;
            access_log off;
        }

        # SPA fallback — anything that isn't an asset, /api, /graphql, or
        # /healthz lands here and serves index.html for client-side routing.
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
