events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 10 MB shared memory zone keyed by client IP (~160 000 states).
    # Gateway-level backstop: 10 requests/min across all /api/ traffic.
    # TEMPORARILY DISABLED FOR TESTING
    # limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

    # Cap the request body. The app uses presigned uploads for large blobs,
    # so JSON/form bodies should never approach this. Raise only if a new
    # endpoint genuinely needs it.
    client_max_body_size 1m;

    # Hide nginx version from error pages and Server header.
    server_tokens off;

    upstream backend {
        server backend:8080;
    }

    upstream frontend {
        server frontend:5173;
    }

    # ----------------------------------------------------------------------
    # Security headers applied to every response.
    # `always` makes them apply on error responses too. HSTS only takes
    # effect over HTTPS, so this is safe to ship before TLS is wired in.
    # CSP is intentionally strict: same-origin everything, plus Google Fonts
    # which is the only external resource in the SPA index.html.
    # ----------------------------------------------------------------------
    map $sent_http_content_type $hp_csp {
        default "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; script-src 'self' 'unsafe-inline'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none';";
    }

    server {
        listen 80;
        server_name localhost;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy $hp_csp always;

        # Redirect /api to backend
        location /api/ {
            # TEMPORARILY DISABLED FOR TESTING
            # limit_req zone=auth_limit burst=5 nodelay;
            # limit_req_status 429;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Redirect /graphql to backend
        location /graphql {
            proxy_pass http://backend/graphql;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # All other traffic to frontend
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Prevent browser caching of frontend files in development to avoid stale bundle errors
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        }
    }
}
