services:
  db:
    image: postgres:15-alpine
    env_file:
      - ../healthy-paws-service/.env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    # Postgres is reachable internally on the healthy-paws-network as
    # `db:5432`. The port is intentionally not published to the host —
    # uncomment the block below only for one-off local debugging.
    # ports:
    #   - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../healthy-paws-service/database.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: &json_logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - healthy-paws-network

  backend:
    build:
      context: ../healthy-paws-service
      target: development
    env_file:
      - ../healthy-paws-service/.env
    environment:
      - DB_HOST=db
      - FRONTEND_URL=http://localhost
    volumes:
      - ../healthy-paws-service:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # /healthz hits the DB with a 1s timeout; 5s interval keeps the loop
    # cheap. Start period covers `npm install` on first dev boot.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
    logging: *json_logging
    networks:
      - healthy-paws-network

  frontend:
    build:
      context: ../healty-paws-frontend
      target: development
    volumes:
      - ../healty-paws-frontend:/app
      - /app/node_modules
    environment:
      - VITE_CACHE_DIR=/tmp/.vite
    depends_on:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    logging: *json_logging
    networks:
      - healthy-paws-network

  gateway:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    logging: *json_logging
    networks:
      - healthy-paws-network

networks:
  healthy-paws-network:
    driver: bridge

volumes:
  postgres_data:
